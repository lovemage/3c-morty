[phases.setup]
nixPkgs = ['nodejs_20', 'python3']

[phases.install]
dependsOn = ['setup']
cmds = ['npm ci']

[phases.build]
dependsOn = ['install']
cmds = ['npm run build']

[start]
cmd = 'npm start'

[variables]
NODE_ENV = 'production'
PORT = '3001'

# Railway volume mount: /app (直接掛載 rick-morty-ecommerce 倉庫)
# 數據庫路徑: /app/server/database/database.db  
# 靜態文件: /app/public/images/
# 構建輸出: /app/dist/ 