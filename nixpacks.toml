[phases.setup]
nixPkgs = ['nodejs_20', 'python3']

[providers]
node = "nodejs_20"

[phases.install]
dependsOn = ['setup']
cmds = ['npm ci']

[phases.build]
dependsOn = ['install']
cmds = [
  'npm run build',
  'echo "Build completed - checking files:"',
  'ls -la dist/',
  'echo "Index.html content:"',
  'head -5 dist/index.html'
]

[start]
cmd = 'npm start'

[deploy]
type = "node"

[variables]
NODE_ENV = 'production'

# Railway 根目錄配置 - 所有文件在 /app 根目錄
# 不使用子目錄：rick-morty-ecommerce
# 項目根目錄: /app
# 數據庫路徑: /app/server/database/database.db  
# 靜態文件: /app/public/images/
# 構建輸出: /app/dist/
# 啟動文件: /app/server/index.js 