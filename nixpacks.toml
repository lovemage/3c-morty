[phases.setup]
nixPkgs = ['nodejs_20', 'python3']

[phases.install]
dependsOn = ['setup']
cmds = ['npm ci']

[phases.build]
dependsOn = ['install']
cmds = [
  'npm run build',
  'echo "Build completed - checking files:"',
  'ls -la dist/',
  'echo "Index.html content:"',
  'head -5 dist/index.html'
]

[start]
cmd = 'npm start'

[variables]
NODE_ENV = 'production'

# Railway volume mount: /app (項目文件直接在根目錄)
# 數據庫路徑: /app/server/database/database.db  
# 靜態文件: /app/public/images/
# 構建輸出: /app/dist/ 